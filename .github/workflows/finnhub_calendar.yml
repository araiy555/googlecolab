name: Finnhub経済指標カレンダー取得

on:
  schedule:
    - cron: '0 23 * * 1-5'  # 毎週月〜金 JST 08:00（UTC 23:00）
  workflow_dispatch:
    inputs:
      mode:
        description: '取得モード (daily or historical)'
        required: false
        default: 'daily'

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存ライブラリインストール
        run: |
          pip install boto3 requests

      - name: Finnhub経済指標カレンダー取得
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          SLACK_WEBHOOK_URL:     ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python batch_finnhub_calendar.py ${{ github.event.inputs.mode || 'daily' }}
