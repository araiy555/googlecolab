name: Mirror Disclosure PDFs

on:
  schedule:
    - cron: '30 12 * * *'   # 毎日 UTC 12:30（JST 21:30）※collectの後あたりに
  workflow_dispatch:
    inputs:
      months:
        description: '処理する月（スペース区切り 例: 2026-06 2026-05）。空なら当月+前月'
        required: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install boto3 requests

      - name: Mirror PDFs to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-northeast-1
        run: python mirror_disclosure_pdfs.py ${{ github.event.inputs.months }}
